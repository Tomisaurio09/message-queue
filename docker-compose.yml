version: "3.9"

services:
  api:
    build: .
    working_dir: /app
    container_name: api
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - DEBUG=${DEBUG}
    ports:
      - "8000:8000"
    volumes: 
      - ./src/app/uploads:/app/uploads 
      - ./src/app/processed:/app/processed
    

  worker:
    build: .
    container_name: worker
    command: celery -A src.app.celery_app worker --loglevel=info
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - DEBUG=${DEBUG}
    volumes: 
      - ./src/app/uploads:/app/uploads 
      - ./src/app/processed:/app/processed
      
  rabbitmq:
    image: rabbitmq:3-management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  flower:
    image: message-queue_worker:latest   
    command: celery -A src.app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - DEBUG=${DEBUG}
    depends_on:
      rabbitmq: 
        condition: service_healthy
      postgres: 
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
